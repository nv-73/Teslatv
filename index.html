<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLEYR TESLA FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 300px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .content-list { flex: 1; overflow-y: auto; background: #0a0a0a; scrollbar-width: none; }
        .item-card { background: #111; border: 1px solid #222; margin: 8px; padding: 15px; border-radius: 12px; cursor: pointer; }
        .item-card:active { background: #e82127; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 1px solid #1a1a1a; }
        .cat-item { padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 11px; font-bold: bold; text-transform: uppercase; }
        .cat-active { border-left: 4px solid #e82127; background: #111; color: #e82127; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="sidebar">
        <div class="p-4 border-b border-white/5">
            <h1 class="font-black italic text-xl">PLEYR<span class="text-red-600">TESLA</span></h1>
        </div>
        <div id="category-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <section class="flex-1 flex flex-col border-r border-white/5">
        <div class="h-14 flex items-center px-4 border-b border-white/5 bg-[#080808]">
            <input type="text" id="search" oninput="filterChannels()" placeholder="RECHERCHER..." class="bg-transparent outline-none text-xs w-full">
        </div>
        <div id="channel-list" class="content-list"></div>
    </section>

    <main class="w-[45%] flex flex-col bg-black">
        <!-- ON REVIENT A UNE BALISE HTML5 SIMPLE MAIS AVEC LE FIX TESLA -->
        <video id="video" controls autoplay playsinline muted></video>
        
        <div class="p-8 text-center">
            <h2 id="now-playing" class="text-2xl font-black italic uppercase text-gray-700">Sélectionnez</h2>
            <div class="mt-10 p-6 border border-red-600/20 rounded-2xl bg-red-600/5">
                <p class="text-[10px] text-red-500 font-bold leading-relaxed uppercase">
                    SI MESSAGE D'ERREUR :<br>
                    1. Cliquez sur l'icône de cadenas à gauche de l'URL (barre d'adresse)<br>
                    2. Allez dans "Paramètres du site"<br>
                    3. Autorisez "Contenu non sécurisé" (Insecure Content)<br>
                    4. Rechargez la page
                </p>
            </div>
        </div>
    </main>

    <script>
        const API = { host: "http://pl-ott.com:80", user: "8576200005", pass: "9637719534" };
        // PROXY DIFFERENT POUR EVITER LE BLOCAGE FORMAT
        const PROXY = "https://api.allorigins.win/raw?url=";
        
        let currentChannels = [];
        let hls = new Hls();

        async function loadCategories() {
            const url = `${API.host}/player_api.php?username=${API.user}&password=${API.pass}&action=get_live_categories`;
            const r = await fetch(PROXY + encodeURIComponent(url));
            const data = await r.json();
            const container = document.getElementById('category-list');
            container.innerHTML = data.map(c => `
                <div class="cat-item" onclick="loadChannels('${c.category_id}', this)">${c.category_name}</div>
            `).join('');
        }

        async function loadChannels(catId, el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('cat-active'));
            el.classList.add('cat-active');
            const url = `${API.host}/player_api.php?username=${API.user}&password=${API.pass}&action=get_live_streams&category_id=${catId}`;
            const r = await fetch(PROXY + encodeURIComponent(url));
            currentChannels = await r.json();
            render(currentChannels);
        }

        function render(data) {
            const container = document.getElementById('channel-list');
            container.innerHTML = data.map(ch => `
                <div class="item-card flex items-center gap-4" onclick="play('${ch.stream_id}', '${ch.name.replace(/'/g, " ")}')">
                    <div class="font-bold text-xs truncate uppercase">${ch.name}</div>
                </div>
            `).join('');
        }

        function play(id, name) {
            document.getElementById('now-playing').innerText = name;
            document.getElementById('now-playing').style.color = "white";
            
            // CONSTRUCTION DE L'URL DIRECTE (SANS .M3U8 PARFOIS CA AIDE)
            const streamUrl = `${API.host}/live/${API.user}/${API.pass}/${id}.m3u8`;
            const proxiedUrl = "https://corsproxy.io/?" + encodeURIComponent(streamUrl);
            
            const video = document.getElementById('video');

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(proxiedUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                });
            } 
            // Support pour navigateur qui lit le HLS nativement (comme certains firmwares Tesla)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = proxiedUrl;
                video.play();
            }
        }

        function filterChannels() {
            const q = document.getElementById('search').value.toLowerCase();
            render(currentChannels.filter(c => c.name.toLowerCase().includes(q)));
        }

        loadCategories();
    </script>
</body>
</html>
