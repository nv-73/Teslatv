<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLEYR ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .tesla-scroll::-webkit-scrollbar { width: 8px; }
        .tesla-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .active-ch { background: #1e1e1e; border-left: 4px solid #ef4444; }
        #debugLog { font-family: monospace; font-size: 10px; color: #666; background: #0a0a0a; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- BARRE DE STATUS & DEBUG -->
    <div id="debugLog" class="p-2 border-b border-gray-900">Initialisation du système...</div>

    <div class="flex flex-1 overflow-hidden">
        <!-- LISTE (60% de l'écran pour faciliter le clic tactile) -->
        <aside class="w-1/3 flex flex-col border-r border-gray-900 bg-black">
            <div class="p-4 bg-[#0a0a0a]">
                <input type="text" id="search" onkeyup="filter()" placeholder="Rechercher une chaîne..." 
                       class="w-full bg-[#151515] border border-gray-800 rounded-xl p-4 text-lg outline-none focus:border-red-600">
            </div>
            <div id="list" class="flex-1 overflow-y-auto tesla-scroll">
                <div class="p-10 text-center animate-pulse text-gray-500">Connexion au serveur...</div>
            </div>
        </aside>

        <!-- LECTEUR -->
        <main class="flex-1 flex flex-col bg-black">
            <div class="aspect-video bg-black relative">
                <video id="video" controls autoplay class="w-full h-full"></video>
            </div>
            <div class="p-8">
                <h1 id="title" class="text-3xl font-black italic text-red-600">PLEYR.TV</h1>
                <p id="cat" class="text-gray-500 font-bold uppercase tracking-widest mt-2">Prêt à diffuser</p>
                
                <div class="mt-10 grid grid-cols-2 gap-4">
                    <button onclick="location.reload()" class="bg-gray-900 p-4 rounded-xl font-bold">RECHARGER</button>
                    <button onclick="tryAlternativeProxy()" class="bg-red-600/20 text-red-500 p-4 rounded-xl font-bold">AUTRE PROXY</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const config = {
            host: "http://pl-ott.com:80",
            user: "8576200005",
            pass: "9637719534",
            proxy: "https://api.allorigins.win/get?url=" // Premier essai
        };

        const log = (msg) => {
            const d = document.getElementById('debugLog');
            d.innerHTML += `<br>> ${msg}`;
            d.scrollTop = d.scrollHeight;
        };

        let hls = new Hls();
        let allData = [];

        async function loadChannels() {
            log("Tentative de récupération des chaînes...");
            const api = `${config.host}/player_api.php?username=${config.user}&password=${config.pass}&action=get_live_streams`;
            
            try {
                const response = await fetch(config.proxy + encodeURIComponent(api));
                const json = await response.json();
                
                // AllOrigins encapsule dans "contents"
                const data = typeof json.contents === "string" ? JSON.parse(json.contents) : json;

                if (Array.isArray(data)) {
                    allData = data;
                    log(`${data.length} chaînes chargées avec succès.`);
                    render(allData);
                } else {
                    throw new Error("Réponse serveur invalide");
                }
            } catch (e) {
                log(`ERREUR : ${e.message}`);
                document.getElementById('list').innerHTML = `<div class="p-6 text-red-500 text-sm">Le navigateur Tesla bloque l'accès. Essayez de passer par l'app YouTube pour le plein écran.</div>`;
            }
        }

        function render(channels) {
            const container = document.getElementById('list');
            container.innerHTML = "";
            channels.slice(0, 300).forEach(ch => {
                const div = document.createElement('div');
                div.className = "p-5 border-b border-gray-900 flex items-center gap-4 cursor-pointer active:bg-gray-900";
                div.innerHTML = `
                    <div class="w-12 h-12 bg-gray-950 rounded flex-shrink-0 flex items-center justify-center overflow-hidden border border-gray-800">
                        ${ch.stream_icon ? `<img src="${ch.stream_icon}" class="w-full h-full object-contain">` : `<i class="fa-solid fa-tv text-gray-800"></i>`}
                    </div>
                    <div class="truncate font-bold text-lg">${ch.name}</div>
                `;
                div.onclick = () => {
                    play(`${config.host}/live/${config.user}/${config.pass}/${ch.stream_id}.m3u8`, ch.name, ch.category_name);
                    document.querySelectorAll('.active-ch').forEach(el => el.classList.remove('active-ch'));
                    div.classList.add('active-ch');
                };
                container.appendChild(div);
            });
        }

        function play(url, name, category) {
            log(`Lecture de : ${name}`);
            document.getElementById('title').innerText = name;
            document.getElementById('cat').innerText = category || "Live";
            
            // On tente le flux direct (plus rapide si autorisé)
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls({
                    xhrSetup: function(xhr, url) {
                        xhr.withCredentials = false;
                    }
                });
                hls.loadSource(url);
                hls.attachMedia(document.getElementById('video'));
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    log("Manifeste chargé, lecture...");
                    document.getElementById('video').play();
                });
                
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        log("Erreur fatale, tentative via Proxy vidéo...");
                        hls.loadSource("https://corsproxy.io/?" + encodeURIComponent(url));
                    }
                });
            }
        }

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            render(allData.filter(c => c.name.toLowerCase().includes(q)));
        }

        function tryAlternativeProxy() {
            config.proxy = "https://corsproxy.io/?";
            log("Changement de proxy vers CORS-Proxy...");
            loadChannels();
        }

        loadChannels();
    </script>
</body>
</html>
