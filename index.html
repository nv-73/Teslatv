<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLEYR SMARTERS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Video.js Ressources -->
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 320px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .content-list { flex: 1; overflow-y: auto; background: #0a0a0a; scrollbar-width: none; }
        .item-card { background: #111; border: 1px solid #222; margin: 8px; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.1s; }
        .item-card:active { background: #e82127; border-color: #e82127; }
        /* Style spécifique pour que Video.js s'adapte bien */
        .video-js { width: 100% !important; aspect-ratio: 16/9 !important; }
    </style>
</head>
<body class="flex h-screen">

    <!-- BARRE DES CATÉGORIES -->
    <aside class="sidebar">
        <div class="p-4 border-b border-white/5">
            <h1 class="font-black italic text-xl tracking-tighter">PLEYR<span class="text-red-600">SMART</span></h1>
        </div>
        <div id="category-list" class="flex-1 overflow-y-auto scrollbar-none">
            <div class="p-10 text-center opacity-20">Chargement...</div>
        </div>
    </aside>

    <!-- LISTE DES CHAÎNES -->
    <section class="flex-1 flex flex-col border-right border-white/5">
        <div class="h-14 flex items-center px-6 border-b border-white/5 bg-[#080808]">
            <input type="text" id="search" oninput="filterChannels()" placeholder="Rechercher..." class="bg-transparent outline-none text-sm w-full">
        </div>
        <div id="channel-list" class="content-list">
            <div class="p-20 text-center text-gray-600 font-bold uppercase tracking-widest text-xs">
                Sélectionnez une catégorie
            </div>
        </div>
    </section>

    <!-- LECTEUR (Video.js remplace la balise video standard) -->
    <main class="w-[45%] flex flex-col bg-black">
        <video id="v" class="video-js vjs-default-skin" controls preload="auto" playsinline muted></video>
        
        <div class="p-8">
            <h2 id="now-playing" class="text-3xl font-black italic uppercase text-gray-800">Aucun flux</h2>
            <div id="ch-info" class="mt-4 text-sm text-gray-500 font-bold uppercase tracking-widest"></div>
            
            <div class="mt-20 p-4 border border-white/5 rounded-2xl bg-white/[0.02]">
                <p class="text-[10px] text-gray-600 leading-relaxed uppercase">
                    Mode Smart : Chargement par fragments pour processeur Tesla.
                </p>
            </div>
        </div>
    </main>

    <script>
        const API = { host: "http://pl-ott.com:80", user: "8576200005", pass: "9637719534", proxy: "https://corsproxy.io/?" };
        let currentChannels = [];
        
        // Initialisation de Video.js
        const player = videojs('v', {
            html5: { vhs: { overrideNative: true } }
        });

        async function loadCategories() {
            const url = `${API.host}/player_api.php?username=${API.user}&password=${API.pass}&action=get_live_categories`;
            try {
                const r = await fetch(API.proxy + encodeURIComponent(url));
                const data = await r.json();
                renderCategories(data);
            } catch (e) { document.getElementById('category-list').innerHTML = "Erreur de chargement"; }
        }

        function renderCategories(cats) {
            const container = document.getElementById('category-list');
            container.innerHTML = cats.map(c => `
                <div class="p-4 border-b border-white/5 text-sm font-bold uppercase tracking-tighter cursor-pointer hover:bg-white/5 active:bg-red-600/20" 
                     onclick="loadChannels('${c.category_id}', this)">
                    ${c.category_name}
                </div>
            `).join('');
        }

        async function loadChannels(catId, el) {
            document.querySelectorAll('#category-list div').forEach(d => d.style.borderLeft = "none");
            el.style.borderLeft = "4px solid #e82127";
            
            document.getElementById('channel-list').innerHTML = "<div class='p-10 text-center animate-pulse'>Chargement du paquet...</div>";
            
            const url = `${API.host}/player_api.php?username=${API.user}&password=${API.pass}&action=get_live_streams&category_id=${catId}`;
            try {
                const r = await fetch(API.proxy + encodeURIComponent(url));
                currentChannels = await r.json();
                renderChannels(currentChannels);
            } catch (e) { }
        }

        function renderChannels(channels) {
            const container = document.getElementById('channel-list');
            container.innerHTML = channels.map(ch => `
                <div class="item-card flex items-center gap-4" onclick="play('${ch.stream_id}', '${ch.name.replace(/'/g, " ")}')">
                    <div class="w-10 h-10 bg-black rounded flex items-center justify-center border border-white/5">
                        <i class="fa-solid fa-play text-[10px] opacity-20"></i>
                    </div>
                    <div class="font-bold text-sm truncate">${ch.name}</div>
                </div>
            `).join('');
        }

        function play(id, name) {
            document.getElementById('now-playing').innerText = name;
            document.getElementById('now-playing').classList.remove('text-gray-800');
            const streamUrl = `${API.proxy}${encodeURIComponent(API.host + '/live/' + API.user + '/' + API.pass + '/' + id + '.m3u8')}`;
            
            // Utilisation de l'API Video.js pour charger et lire
            player.src({
                src: streamUrl,
                type: 'application/x-mpegURL'
            });
            player.play();
        }

        function filterChannels() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = currentChannels.filter(c => c.name.toLowerCase().includes(q));
            renderChannels(filtered);
        }

        loadCategories();
    </script>
</body>
</html>
