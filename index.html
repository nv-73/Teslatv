<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVSTREAM CLONE - TESLA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --tesla-red: #e82127; --tesla-dark: #000000; --tesla-card: #111111; }
        body { background-color: var(--tesla-dark); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        
        /* Liste style EVStream */
        .channel-list { height: calc(100vh - 80px); overflow-y: auto; scrollbar-width: none; }
        .channel-list::-webkit-scrollbar { display: none; }
        
        .channel-btn {
            background: var(--tesla-card);
            border: 1px solid #222;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .channel-btn:active { transform: scale(0.98); background: #222; border-color: var(--tesla-red); }
        .channel-btn.active { border-left: 6px solid var(--tesla-red); background: #1a1a1a; }

        .video-container { background: #000; box-shadow: 0 0 50px rgba(0,0,0,1); position: relative; }
        
        /* Input style Tesla */
        .search-input { background: #181818; border: 1px solid #333; color: white; }
        .search-input:focus { border-color: var(--tesla-red); outline: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header Style EVStream -->
    <header class="h-16 flex items-center justify-between px-8 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-2 h-8 bg-red-600 rounded-full"></div>
            <h1 class="text-xl font-bold tracking-tight uppercase">EV<span class="text-red-600">STREAM</span> <span class="font-light opacity-50 text-sm">CLONE</span></h1>
        </div>
        <div id="connection-status" class="text-[10px] font-bold text-green-500 uppercase flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Serveur Actif
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <!-- Sidebar Gauche (Liste des chaînes) -->
        <aside class="w-[400px] flex flex-col border-r border-white/5 bg-[#080808]">
            <div class="p-4">
                <input type="text" id="search" onkeyup="filterChannels()" placeholder="Rechercher une chaîne..." 
                       class="search-input w-full p-4 rounded-2xl text-lg font-medium">
            </div>
            
            <div id="list" class="channel-list px-4 pb-20">
                <!-- Les chaînes arrivent ici -->
                <div class="mt-20 text-center opacity-30">
                    <i class="fa-solid fa-circle-notch animate-spin text-4xl mb-4"></i>
                    <p>Chargement de votre playlist...</p>
                </div>
            </div>
        </aside>

        <!-- Player Droite -->
        <main class="flex-1 flex flex-col relative bg-black">
            <div class="video-container flex-1 flex items-center justify-center">
                <video id="teslaPlayer" class="w-full h-full" controls autoplay playsinline></video>
                
                <!-- Overlay si rien n'est chargé -->
                <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-10">
                    <i class="fa-solid fa-play text-6xl text-white/10 mb-4"></i>
                    <p class="text-gray-500 font-bold uppercase tracking-widest">Sélectionnez un flux</p>
                </div>
            </div>

            <!-- Infos de la chaîne -->
            <div class="h-32 bg-[#0a0a0a] border-t border-white/5 p-6 flex items-center gap-6">
                <div id="ch-logo" class="w-20 h-20 bg-black rounded-xl border border-white/10 p-2 flex items-center justify-center overflow-hidden">
                    <i class="fa-solid fa-tv text-2xl opacity-10"></i>
                </div>
                <div>
                    <h2 id="ch-name" class="text-2xl font-bold italic truncate w-[500px]">PRÊT À DIFFUSER</h2>
                    <p id="ch-cat" class="text-gray-500 text-sm font-bold uppercase tracking-tighter">PLEYR MEDIA ENGINE V4</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Tes accès déjà injectés
        const API_CONFIG = {
            host: "http://pl-ott.com:80",
            user: "8576200005",
            pass: "9637719534"
        };

        const PROXY = "https://corsproxy.io/?"; // Tunnel sécurisé indispensable pour Tesla
        const video = document.getElementById('teslaPlayer');
        let hls = new Hls();
        let allChannels = [];

        async function init() {
            const apiLink = `${API_CONFIG.host}/player_api.php?username=${API_CONFIG.user}&password=${API_CONFIG.pass}&action=get_live_streams`;
            
            try {
                const response = await fetch(PROXY + encodeURIComponent(apiLink));
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    allChannels = data;
                    renderChannels(allChannels);
                }
            } catch (err) {
                document.getElementById('list').innerHTML = `<div class="p-8 text-red-500 font-bold text-center">Erreur de connexion. Vérifiez vos accès ou autorisez le contenu non sécurisé sur la Tesla.</div>`;
            }
        }

        function renderChannels(channels) {
            const list = document.getElementById('list');
            list.innerHTML = "";

            channels.slice(0, 500).forEach(ch => {
                const streamUrl = `${API_CONFIG.host}/live/${API_CONFIG.user}/${API_CONFIG.pass}/${ch.stream_id}.m3u8`;
                const btn = document.createElement('div');
                btn.className = "channel-btn p-5 mb-3 rounded-2xl flex items-center gap-4 cursor-pointer";
                btn.innerHTML = `
                    <div class="w-12 h-12 bg-black rounded-lg flex-shrink-0 flex items-center justify-center p-1">
                        ${ch.stream_icon ? `<img src="${ch.stream_icon}" class="w-full h-full object-contain">` : `<i class="fa-solid fa-tv opacity-20"></i>`}
                    </div>
                    <div class="flex-1 truncate">
                        <div class="font-bold text-lg truncate">${ch.name}</div>
                        <div class="text-[10px] text-gray-500 font-bold uppercase">${ch.category_name || 'Direct'}</div>
                    </div>
                `;
                btn.onclick = () => playChannel(streamUrl, ch.name, ch.stream_icon, ch.category_name, btn);
                list.appendChild(btn);
            });
        }

        function playChannel(url, name, icon, cat, element) {
            // UI Updates
            document.getElementById('video-placeholder').style.display = 'none';
            document.getElementById('ch-name').innerText = name;
            document.getElementById('ch-cat').innerText = cat || "LIVE";
            document.getElementById('ch-logo').innerHTML = icon ? `<img src="${icon}" class="w-full h-full object-contain">` : `<i class="fa-solid fa-tv text-2xl opacity-10"></i>`;
            
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');

            // On force le passage par le proxy pour que la Tesla accepte le flux HTTP sur une page HTTPS
            const secureStreamUrl = PROXY + encodeURIComponent(url);

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls({
                    xhrSetup: function(xhr) { xhr.withCredentials = false; }
                });
                hls.loadSource(secureStreamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = secureStreamUrl;
                video.play();
            }
        }

        function filterChannels() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(q));
            renderChannels(filtered);
        }

        init();
    </script>
</body>
</html>
