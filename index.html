<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla IPTV Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #e50914; --bg: #000; --panel: #1a1a1a; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        #navbar { width: 80px; background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 15px; border-right: 1px solid #333; }
        .nav-item { margin-bottom: 20px; cursor: pointer; text-align: center; opacity: 0.5; font-size: 11px; width: 100%; }
        .nav-item.active { opacity: 1; color: var(--primary); border-left: 3px solid var(--primary); }

        #sidebar { width: 350px; background: var(--panel); display: flex; flex-direction: column; }
        .search-box { padding: 10px; background: #000; }
        #search { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #222; color: white; }
        
        #list-container { flex: 1; overflow-y: auto; }
        .item { padding: 12px 15px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; }
        .item:hover { background: #252525; }
        .item small { color: #888; display: block; margin-top: 3px; }

        #player-zone { flex: 1; background: #000; position: relative; }
        video { width: 100%; height: 100%; }
        
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .stats { margin-top: 20px; color: #888; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-size: 24px; color: var(--primary);">⌛ Chargement...</div>
    <div class="stats" id="stats">Connexion au serveur...</div>
</div>

<nav id="navbar">
    <div class="nav-item active" onclick="switchTab('all', this)">🌐<span>TOUT</span></div>
    <div class="nav-item" onclick="switchTab('live', this)">📺<span>DIRECT</span></div>
    <div class="nav-item" onclick="switchTab('vod', this)">🎬<span>VOD</span></div>
    <div class="nav-item" onclick="switchTab('series', this)">🍿<span>SERIES</span></div>
</nav>

<div id="sidebar">
    <div class="search-box"><input type="text" id="search" placeholder="Rechercher..."></div>
    <div id="list-container"></div>
</div>

<div id="player-zone"><video id="videoPlayer" controls autoplay></video></div>

<script>
    const CONFIG = {
        host: "http://pl-ott.com",
        user: "8576200005",
        pass: "9637719534"
    };

    const PROXY = "https://api.allorigins.win/raw?url=";
    const M3U_URL = `${CONFIG.host}/get.php?username=${CONFIG.user}&password=${CONFIG.pass}&type=m3u_plus&output=ts`;

    let database = { all: [], live: [], vod: [], series: [] };
    let currentCategory = 'all';
    const hls = new Hls();

    async function load() {
        const stats = document.getElementById('stats');
        try {
            const res = await fetch(PROXY + encodeURIComponent(M3U_URL));
            const data = await res.text();
            
            const lines = data.split('\n');
            let current = null;

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const title = line.split(',')[1] || "Sans titre";
                    // On cherche "group-title" mais aussi d'autres variantes
                    const group = (line.match(/group-title="([^"]+)"/i) || ["", "Inconnu"])[1];
                    current = { title, group };
                } else if (line.startsWith('http') && current) {
                    current.url = line;
                    const g = current.group.toUpperCase();
                    
                    database.all.push(current);
                    
                    // Tri plus large
                    if (g.includes('VOD') || g.includes('MOVIE') || g.includes('FILM') || g.includes('CINEMA')) {
                        database.vod.push(current);
                    } else if (g.includes('SERIE') || g.includes('EPISOD') || g.includes('SEASON')) {
                        database.series.push(current);
                    } else {
                        database.live.push(current);
                    }
                    current = null;
                }
            });

            stats.textContent = `${database.all.length} éléments trouvés.`;
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
            render();
        } catch (e) {
            stats.textContent = "Erreur de chargement. Vérifiez vos accès.";
        }
    }

    function render(query = "") {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        const list = database[currentCategory].filter(i => i.title.toLowerCase().includes(query.toLowerCase()));

        list.slice(0, 500).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<b>${item.title}</b><small>${item.group}</small>`;
            div.onclick = () => {
                if (Hls.isSupported()) {
                    hls.loadSource(item.url);
                    hls.attachMedia(document.getElementById('videoPlayer'));
                } else {
                    document.getElementById('videoPlayer').src = item.url;
                }
            };
            container.appendChild(div);
        });
    }

    function switchTab(type, el) {
        currentCategory = type;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    document.getElementById('search').oninput = (e) => render(e.target.value);
    load();
</script>
</body>
</html>
