<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadeed Web Player</title>
    <!-- Bibliothèques pour la lecture de flux IPTV (HLS) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --main-gold: #d4af37; --bg-dark: #0a0a0a; }
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: sans-serif; }
        
        /* Layout inspiré de activity_live.xml */
        .container { display: grid; grid-template-columns: 250px 1fr; height: 100vh; }
        
        .sidebar { background: #111; padding: 20px; border-right: 1px solid #333; }
        .logo { width: 100%; margin-bottom: 30px; } /* shaDeed_lg.png */
        
        .nav-item { 
            padding: 15px; margin-bottom: 10px; cursor: pointer; 
            border-radius: 5px; transition: 0.3s;
        }
        .nav-item:hover { background: var(--main-gold); color: black; }

        /* Zone Lecteur inspirée de exo_player_view.xml */
        .player-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; background: black; }
        video { width: 90%; max-height: 80vh; border: 2px solid #222; }
        
        .controls { margin-top: 20px; width: 90%; }
        input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <h2 style="color:var(--main-gold)">SHADEED</h2> <!-- Logo textuel temporaire[cite: 1] -->
        <div class="nav-item">LIVE TV</div> <!-- activity_live.xml[cite: 1] -->
        <div class="nav-item">MOVIES</div> <!-- activity_movie.xml[cite: 1] -->
        <div class="nav-item">SERIES</div> <!-- activity_series.xml[cite: 1] -->
        <div class="nav-item">SETTINGS</div> <!-- activity_setting.xml[cite: 1] -->
    </aside>

    <main class="player-zone">
        <video id="video" controls></video>
        
        <div class="controls">
            <p>Collez votre lien de flux (M3U8) ici :</p>
            <input type="text" id="streamUrl" placeholder="https://exemple.com/flux.m3u8" 
                   onchange="playStream(this.value)">
        </div>
    </main>
</div>

<script>
    function playStream(url) {
        const video = document.getElementById('video');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    }
</script>

</body>
</html>
