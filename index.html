<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLEYR TURBO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .ch-list { height: calc(100vh - 120px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .ch-card { background: #111; border: 1px solid #222; margin-bottom: 8px; border-radius: 12px; transition: 0.1s; }
        .ch-card:active { background: #222; border-color: #e82127; }
        .active { border-left: 6px solid #e82127; background: #151515; }
        #video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-14 flex items-center justify-between px-6 border-b border-white/5">
        <h1 class="font-bold tracking-tighter">PLEYR<span class="text-red-600">TURBO</span></h1>
        <div id="status" class="text-[9px] font-bold opacity-50 uppercase tracking-widest">Initialisation...</div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar Ultra-Rapide -->
        <aside class="w-[380px] flex flex-col bg-[#050505] border-r border-white/5">
            <div class="p-3">
                <input type="text" id="search" onkeyup="filter()" placeholder="Recherche instantanée..." 
                       class="w-full bg-[#151515] border border-white/10 p-4 rounded-xl text-lg outline-none focus:border-red-600">
            </div>
            <div id="list" class="ch-list px-3"></div>
        </aside>

        <!-- Player -->
        <main class="flex-1 flex flex-col">
            <div id="video-container">
                <video id="v" class="w-full h-full" controls autoplay></video>
            </div>
            <div class="p-6">
                <h2 id="ch-title" class="text-2xl font-bold italic">PRÊT</h2>
                <button onclick="refreshCache()" class="mt-4 text-[10px] text-gray-600 border border-gray-800 px-3 py-1 rounded-full uppercase">Forcer Refresh Playlist</button>
            </div>
        </div>
    </div>

    <script>
        const API = { host: "http://pl-ott.com:80", user: "8576200005", pass: "9637719534" };
        const PROXY = "https://corsproxy.io/?";
        let allChannels = [];
        let hls = new Hls();

        // 1. CHARGEMENT ULTRA-RAPIDE VIA CACHE
        async function load() {
            const status = document.getElementById('status');
            const cached = localStorage.getItem('playlist_cache');

            if (cached) {
                allChannels = JSON.parse(cached);
                status.innerText = "Cache chargé (" + allChannels.length + ")";
                render(allChannels.slice(0, 50)); // Affiche direct le cache
            }

            // En arrière-plan, on vérifie si mise à jour nécessaire
            updateFromServer();
        }

        async function updateFromServer() {
            const url = `${API.host}/player_api.php?username=${API.user}&password=${API.pass}&action=get_live_streams`;
            try {
                const r = await fetch(PROXY + encodeURIComponent(url));
                const d = await r.json();
                if (Array.isArray(d)) {
                    allChannels = d;
                    localStorage.setItem('playlist_cache', JSON.stringify(d));
                    document.getElementById('status').innerText = "Sync terminé";
                    if (!localStorage.getItem('playlist_cache')) render(allChannels.slice(0, 50));
                }
            } catch (e) { console.log("Mode hors-ligne ou erreur"); }
        }

        function render(data, append = false) {
            const container = document.getElementById('list');
            if (!append) container.innerHTML = "";
            
            const html = data.map(ch => `
                <div class="ch-card p-4 flex items-center gap-3 cursor-pointer" onclick="play('${ch.stream_id}', '${ch.name.replace(/'/g, "\\'")}', this)">
                    <div class="w-10 h-10 bg-black rounded flex-shrink-0 flex items-center justify-center border border-white/5 font-bold text-xs text-gray-700">
                        ${ch.name.substring(0,2)}
                    </div>
                    <div class="truncate font-bold text-sm uppercase">${ch.name}</div>
                </div>
            `).join('');
            
            container.insertAdjacentHTML('beforeend', html);
        }

        function play(id, name, el) {
            document.getElementById('ch-title').innerText = name;
            document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');

            const streamUrl = `${PROXY}${encodeURIComponent(API.host + '/live/' + API.user + '/' + API.pass + '/' + id + '.m3u8')}`;
            
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls({capLevelToPlayerSize: true, maxBufferLength: 10});
                hls.loadSource(streamUrl);
                hls.attachMedia(document.getElementById('v'));
            }
        }

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(q)).slice(0, 60);
            render(filtered);
        }

        function refreshCache() {
            localStorage.removeItem('playlist_cache');
            location.reload();
        }

        load();
    </script>
</body>
</html>
