<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLEYR - Web TV Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --accent: #ff0000; --bg: #050505; --panel: #111111; }
        body { background-color: var(--bg); color: white; height: 100vh; overflow: hidden; }
        
        /* Personnalisation Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .video-box { aspect-ratio: 16/9; background: #000; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); overflow: hidden; }
        .sidebar-ch { background: var(--panel); border-right: 1px solid #222; }
        .ch-card { transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); margin: 4px 10px; border-radius: 12px; }
        .ch-card:hover { background: #1a1a1a; transform: scale(1.02); }
        .ch-active { background: #222 !important; border-left: 3px solid var(--accent); }
        
        .modal-blur { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; backdrop-filter: blur(10px); }
        .input-dark { background: #1a1a1a; border: 1px solid #333; transition: 0.3s; }
        .input-dark:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        
        .shimmer { background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex flex-col font-sans">

    <!-- MODAL CONNEXION -->
    <div id="loginModal" class="modal-blur flex items-center justify-center">
        <div class="bg-[#111] p-10 rounded-3xl w-[450px] border border-white/10 shadow-2xl">
            <div class="flex flex-col items-center mb-8">
                <div class="w-20 h-20 bg-red-600 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(220,38,38,0.4)] mb-4">
                    <i class="fa-solid fa-play text-4xl text-white"></i>
                </div>
                <h2 class="text-3xl font-black italic tracking-tighter">CONFIGURER XTREAM</h2>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="host" placeholder="Ex: http://pl-ott.com:80" class="w-full input-dark p-4 rounded-xl text-sm" value="http://pl-ott.com:80">
                <input type="text" id="user" placeholder="Username" class="w-full input-dark p-4 rounded-xl text-sm" value="8576200005">
                <input type="password" id="pass" placeholder="Password" class="w-full input-dark p-4 rounded-xl text-sm" value="9637719534">
                
                <button onclick="connectXtream()" id="btnConn" class="w-full bg-red-600 hover:bg-red-700 h-14 rounded-xl font-bold transition flex items-center justify-center gap-3">
                    <span>LANCER LE FLUX</span>
                </button>
                <p class="text-center text-[10px] text-gray-600 uppercase tracking-widest mt-2">Accès direct sécurisé</p>
            </div>
        </div>
    </div>

    <!-- TOPBAR -->
    <header class="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-black">
        <div class="flex items-center gap-10">
            <h1 class="text-2xl font-black tracking-tighter italic text-red-600">PLEYR<span class="text-white">.LIVE</span></h1>
            <div class="relative hidden lg:block">
                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                <input type="text" id="search" onkeyup="filterList()" placeholder="Rechercher une chaine..." class="bg-[#111] border-none rounded-full py-2.5 pl-10 pr-6 text-xs w-[350px] focus:ring-1 focus:ring-red-600 transition-all">
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="https://youtube.com" target="_blank" class="text-gray-400 hover:text-white transition"><i class="fa-brands fa-youtube text-xl"></i></a>
            <button onclick="document.getElementById('loginModal').style.display='flex'" class="bg-white/10 hover:bg-white/20 p-2.5 rounded-xl transition">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- LISTE DES CHAINES -->
        <aside class="sidebar-ch w-[380px] flex flex-col">
            <div class="p-5 flex justify-between items-center bg-black/30">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-500">Bouquet Live</h3>
                <span id="badgeCount" class="bg-red-600/10 text-red-500 px-3 py-1 rounded-full text-[10px] font-bold">0 chaines</span>
            </div>
            <div id="list" class="flex-1 overflow-y-auto pt-2 pb-10">
                <!-- Les chaines apparaissent ici -->
                <div class="p-20 text-center opacity-30">
                    <i class="fa-solid fa-satellite-dish text-5xl mb-4"></i>
                    <p class="text-xs">Initialisation requise</p>
                </div>
            </div>
        </aside>

        <!-- LECTEUR PRINCIPAL -->
        <main class="flex-1 p-8 bg-black/20 overflow-y-auto">
            <div class="max-w-6xl mx-auto">
                <div class="video-box mb-8">
                    <video id="player" controls class="w-full h-full"></video>
                </div>

                <div class="flex items-start gap-8">
                    <div id="currentLogo" class="w-24 h-24 bg-[#111] border border-white/5 rounded-2xl flex items-center justify-center p-3">
                        <i class="fa-solid fa-tv text-4xl text-gray-800"></i>
                    </div>
                    <div class="flex-1">
                        <h2 id="currentName" class="text-4xl font-black italic tracking-tighter mb-2">PRÊT À DIFFUSER</h2>
                        <div class="flex items-center gap-4 text-xs font-bold text-gray-500 uppercase">
                            <span class="flex items-center gap-2"><span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> STREAM EN DIRECT</span>
                            <span>•</span>
                            <span id="currentCat">XTREAM API PROTOCOL</span>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button class="w-14 h-14 bg-white/5 hover:bg-white/10 border border-white/5 rounded-2xl transition flex items-center justify-center"><i class="fa-solid fa-heart"></i></button>
                        <button class="w-14 h-14 bg-white/5 hover:bg-white/10 border border-white/5 rounded-2xl transition flex items-center justify-center"><i class="fa-solid fa-share-nodes"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let player = document.getElementById('player');
        let hls = new Hls();
        let allChannels = [];

        window.onload = () => { document.getElementById('loginModal').style.display = 'flex'; };

        async function connectXtream() {
            let host = document.getElementById('host').value.trim();
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btnConn');

            if(!host || !user || !pass) return alert("Champs manquants");
            if(host.endsWith('/')) host = host.slice(0, -1);

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> CONNEXION...';

            // On demande les streams en direct
            const api = `${host}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`;
            
            // Nouveau Proxy plus performant
            const proxy = `https://corsproxy.io/?${encodeURIComponent(api)}`;

            try {
                const response = await fetch(proxy);
                if (!response.ok) throw new Error("Le serveur proxy ne répond pas");

                const data = await response.json();

                if(!Array.isArray(data)) {
                    if (data.user_info && data.user_info.auth === 0) {
                        throw new Error("Identifiants IPTV incorrects");
                    }
                    throw new Error("Format de données invalide");
                }

                allChannels = data;
                document.getElementById('loginModal').style.display = 'none';
                renderList(allChannels, host, user, pass);
                
            } catch (err) {
                console.error(err);
                alert("ERREUR : " + err.message + "\n\nAstuce : Vérifiez que votre lien Host est correct (http://...)");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'LANCER LE FLUX';
            }
        }

        function renderList(channels, host, user, pass) {
            const listDiv = document.getElementById('list');
            document.getElementById('badgeCount').innerText = channels.length + " chaines";
            listDiv.innerHTML = "";

            // On affiche les 500 premières pour la performance
            channels.slice(0, 500).forEach(ch => {
                const url = `${host}/live/${user}/${pass}/${ch.stream_id}.m3u8`;
                const card = document.createElement('div');
                card.className = "ch-card p-4 cursor-pointer flex items-center gap-4 bg-white/[0.02]";
                card.innerHTML = `
                    <div class="w-12 h-12 bg-black rounded-lg flex-shrink-0 overflow-hidden border border-white/5 flex items-center justify-center">
                        ${ch.stream_icon ? `<img src="${ch.stream_icon}" class="w-full h-full object-contain" onerror="this.src=''">` : `<i class="fa-solid fa-tv text-xs opacity-20"></i>`}
                    </div>
                    <div class="flex-1 min-w-0 text-left">
                        <div class="text-[13px] font-bold truncate tracking-tight uppercase">${ch.name}</div>
                        <div class="text-[9px] text-gray-500 font-black mt-1 uppercase">${ch.category_name || 'DIRECT'}</div>
                    </div>
                `;
                card.onclick = () => playStream(url, ch.name, ch.stream_icon, ch.category_name);
                listDiv.appendChild(card);
            });
        }

        function playStream(url, name, icon, cat) {
            document.getElementById('currentName').innerText = name;
            document.getElementById('currentCat').innerText = cat || "LIVE STREAM";
            const logo = document.getElementById('currentLogo');
            
            logo.innerHTML = icon ? `<img src="${icon}" class="w-full h-full object-contain">` : `<i class="fa-solid fa-tv text-4xl text-gray-800"></i>`;

            // Utilisation du proxy aussi pour le flux vidéo si nécessaire (CORS)
            const videoUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url); // On tente sans proxy d'abord pour la vidéo
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                
                // Si erreur de chargement vidéo, on tente avec le proxy
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.details === 'manifestLoadError') {
                        hls.loadSource(videoUrl);
                    }
                });
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.play();
            }
        }

        function filterList() {
            const q = document.getElementById('search').value.toLowerCase();
            const host = document.getElementById('host').value;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(q));
            renderList(filtered, host, user, pass);
        }
    </script>
</body>
</html>
