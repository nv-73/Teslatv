<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla IPTV Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #e50914; --bg: #000; --panel: #141414; --text: #fff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navigation latérale gauche */
        #navbar { width: 90px; background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #222; }
        .nav-item { margin-bottom: 30px; cursor: pointer; text-align: center; opacity: 0.4; transition: 0.3s; width: 100%; }
        .nav-item.active { opacity: 1; color: var(--primary); border-left: 4px solid var(--primary); }
        .nav-item span { display: block; font-size: 10px; text-transform: uppercase; margin-top: 5px; font-weight: bold; }

        /* Liste des chaînes/films */
        #sidebar { width: 350px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .search-box { padding: 15px; background: #000; }
        #search { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #222; color: white; font-size: 16px; outline: none; }
        #list-container { flex: 1; overflow-y: auto; }
        .item { padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; }
        .item:hover { background: #222; }
        .item.active { background: #333; border-left: 4px solid var(--primary); }

        /* Zone Vidéo */
        #player-zone { flex: 1; background: #000; display: flex; flex-direction: column; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .overlay-title { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 4px; font-size: 12px; color: #aaa; pointer-events: none; }

        /* Écran de chargement */
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="load-status" style="margin-top: 20px;">Initialisation des catalogues...</p>
</div>

<nav id="navbar">
    <div class="nav-item active" onclick="switchTab('live', this)"><span>Direct</span></div>
    <div class="nav-item" onclick="switchTab('vod', this)"><span>Films</span></div>
    <div class="nav-item" onclick="switchTab('series', this)"><span>Séries</span></div>
</nav>

<div id="sidebar">
    <div class="search-box">
        <input type="text" id="search" placeholder="Rechercher...">
    </div>
    <div id="list-container"></div>
</div>

<div id="player-zone">
    <div class="overlay-title" id="now-playing">Aucun média sélectionné</div>
    <video id="videoPlayer" controls autoplay></video>
</div>

<script>
    const CONFIG = {
        host: "http://pl-ott.com",
        user: "8576200005",
        pass: "9637719534"
    };

    // Proxy robuste pour contourner les blocages Tesla
    const PROXY = "https://api.allorigins.win/raw?url=";
    const M3U_URL = `${CONFIG.host}/get.php?username=${CONFIG.user}&password=${CONFIG.pass}&type=m3u_plus&output=ts`;

    let database = { live: [], vod: [], series: [] };
    let currentCategory = 'live';
    const hls = new Hls();

    async function start() {
        try {
            const response = await fetch(PROXY + encodeURIComponent(M3U_URL));
            if (!response.ok) throw new Error("Serveur injoignable");
            const data = await response.text();
            parse(data);
            document.getElementById('loader').style.display = 'none';
            render();
        } catch (e) {
            document.getElementById('load-status').textContent = "Erreur de connexion : Vérifiez vos accès.";
            document.getElementById('load-status').style.color = "red";
        }
    }

    function parse(data) {
        const lines = data.split('\n');
        let tempItem = null;

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const title = line.split(',')[1] || "Sans titre";
                const group = (line.match(/group-title="([^"]+)"/i) || ["", ""])[1].toUpperCase();
                tempItem = { title, group };
            } else if (line.startsWith('http') && tempItem) {
                tempItem.url = line;
                if (tempItem.group.includes('VOD') || tempItem.group.includes('MOVIE') || tempItem.group.includes('FILM')) {
                    database.vod.push(tempItem);
                } else if (tempItem.group.includes('SERIE')) {
                    database.series.push(tempItem);
                } else {
                    database.live.push(tempItem);
                }
                tempItem = null;
            }
        });
    }

    function render(query = "") {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        const filtered = database[currentCategory].filter(i => i.title.toLowerCase().includes(query.toLowerCase()));

        filtered.slice(0, 400).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<strong>${item.title}</strong><br><small style="color:#777">${item.group}</small>`;
            div.onclick = () => play(item);
            container.appendChild(div);
        });
    }

    function switchTab(type, el) {
        currentCategory = type;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('search').value = "";
        render();
    }

    function play(item) {
        document.getElementById('now-playing').textContent = item.title;
        const video = document.getElementById('videoPlayer');
        // On essaie le flux direct, si ça bloque le navigateur basculera
        if (Hls.isSupported()) {
            hls.loadSource(item.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = item.url;
        }
    }

    document.getElementById('search').oninput = (e) => render(e.target.value);
    
    start();
</script>
</body>
</html>
