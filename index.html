<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla IPTV Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #e50914; --bg: #000; --panel: #141414; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        #navbar { width: 90px; background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #222; }
        .nav-item { margin-bottom: 25px; cursor: pointer; text-align: center; opacity: 0.4; transition: 0.3s; width: 100%; padding: 10px 0; }
        .nav-item.active { opacity: 1; color: var(--primary); border-left: 4px solid var(--primary); }
        .nav-item span { display: block; font-size: 11px; margin-top: 5px; }

        #sidebar { width: 380px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .search-box { padding: 15px; background: #000; }
        #search { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #222; color: white; font-size: 16px; }
        
        #list-container { flex: 1; overflow-y: auto; }
        .item { padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer; }
        .item:hover { background: #222; }
        .item.active { background: #333; }

        #player-zone { flex: 1; background: #000; display: flex; flex-direction: column; }
        video { width: 100%; height: 100%; }
        
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="load-status">Analyse de la playlist...</p>
</div>

<nav id="navbar">
    <div class="nav-item active" onclick="switchTab('live', this)">📺<span>DIRECT</span></div>
    <div class="nav-item" onclick="switchTab('vod', this)">🎬<span>FILMS</span></div>
    <div class="nav-item" onclick="switchTab('series', this)">🍿<span>SERIES</span></div>
</nav>

<div id="sidebar">
    <div class="search-box">
        <input type="text" id="search" placeholder="Rechercher...">
    </div>
    <div id="list-container"></div>
</div>

<div id="player-zone">
    <video id="videoPlayer" controls autoplay></video>
</div>

<script>
    const CONFIG = {
        host: "http://pl-ott.com",
        user: "8576200005",
        pass: "9637719534"
    };

    // Utilisation d'un autre proxy si corsproxy.io sature
    const PROXY = "https://api.allorigins.win/raw?url=";
    const M3U_URL = `${CONFIG.host}/get.php?username=${CONFIG.user}&password=${CONFIG.pass}&type=m3u_plus&output=m3u8`;

    let database = { live: [], vod: [], series: [] };
    let currentCategory = 'live';
    const hls = new Hls();

    async function loadData() {
        try {
            const response = await fetch(PROXY + encodeURIComponent(M3U_URL));
            const data = await response.text();
            parseM3U(data);
            document.getElementById('loader').style.display = 'none';
            render();
        } catch (error) {
            document.getElementById('load-status').textContent = "Erreur : " + error.message;
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let currentItem = null;

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const title = line.split(',')[1] || "Sans nom";
                const group = (line.match(/group-title="([^"]+)"/i) || ["", ""])[1];
                currentItem = { title, group };
            } else if (line.startsWith('http') && currentItem) {
                currentItem.url = line;
                const g = currentItem.group.toUpperCase();
                
                // Logique de tri plus précise
                if (g.includes('VOD') || g.includes('MOVIES') || g.includes('FILMS') || g.includes('CINEMA')) {
                    database.vod.push(currentItem);
                } else if (g.includes('SERIES') || g.includes('SÉRIES') || g.includes('EPISODE')) {
                    database.series.push(currentItem);
                } else {
                    database.live.push(currentItem);
                }
                currentItem = null;
            }
        });
    }

    function render(filter = "") {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        
        const items = database[currentCategory].filter(i => 
            i.title.toLowerCase().includes(filter.toLowerCase())
        );

        items.slice(0, 500).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<strong>${item.title}</strong><br><small style="color:#777">${item.group}</small>`;
            div.onclick = () => play(item.url);
            container.appendChild(div);
        });
    }

    function switchTab(type, el) {
        currentCategory = type;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('search').value = "";
        render();
    }

    function play(url) {
        // Certains flux nécessitent aussi le proxy pour la lecture sur Tesla
        const finalUrl = url.startsWith('https') ? url : PROXY + encodeURIComponent(url);
        
        if (Hls.isSupported()) {
            hls.loadSource(url); // On tente sans proxy d'abord pour la vidéo
            hls.attachMedia(document.getElementById('videoPlayer'));
        } else {
            document.getElementById('videoPlayer').src = url;
        }
    }

    document.getElementById('search').addEventListener('input', (e) => render(e.target.value));

    loadData();
</script>
</body>
</html>
