<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INSTANT PLEYR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; overflow: hidden; font-family: sans-serif; }
        #list { height: calc(100vh - 120px); overflow-y: auto; overflow-x: hidden; }
        .ch-row { height: 50px; display: flex; items-center: center; padding: 0 20px; border-bottom: 1px solid #111; cursor: pointer; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .ch-row:active { background: #e82127; }
        .active { background: #1a1a1a; border-left: 4px solid #e82127; }
        input { background: #111; border: 1px solid #222; outline: none; }
        input:focus { border-color: #e82127; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-14 flex items-center px-6 border-b border-white/5 bg-black z-50">
        <div class="text-red-600 font-black italic tracking-tighter text-xl">FLASH<span class="text-white">TV</span></div>
        <div id="count" class="ml-auto text-[10px] opacity-40 font-bold">SYSTÈME PRÊT</div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-[350px] flex flex-col bg-black">
            <div class="p-2">
                <input type="text" id="search" oninput="search()" placeholder="Taper pour filtrer..." class="w-full p-4 rounded-xl">
            </div>
            <div id="list" onscroll="render()"></div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#050505]">
            <video id="v" class="w-full bg-black aspect-video" controls autoplay playsinline></video>
            <div class="p-8">
                <h1 id="cur" class="text-3xl font-black italic opacity-20 uppercase">En attente...</h1>
                <div class="mt-10 flex gap-4">
                    <button onclick="update()" class="text-[10px] bg-white/5 border border-white/10 px-4 py-2 rounded-lg hover:bg-white/10">MAJ PLAYLIST</button>
                    <button onclick="localStorage.clear();location.reload()" class="text-[10px] bg-red-600/10 border border-red-600/20 px-4 py-2 rounded-lg text-red-500 font-bold">RESET</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = { host: "http://pl-ott.com:80", user: "8576200005", pass: "9637719534" };
        const PROXY = "https://corsproxy.io/?";
        let db = [], filtered = [];
        const listEl = document.getElementById('list');
        const hls = new Hls({ capLevelToPlayerSize: true, maxBufferLength: 15 });

        // 1. DÉMARRAGE INSTANTANÉ (Cache local)
        async function start() {
            const cache = localStorage.getItem('db');
            if (cache) {
                db = JSON.parse(cache);
                filtered = db;
                document.getElementById('count').innerText = db.length + " CHAINES";
                render();
            } else {
                update();
            }
        }

        // 2. MISE À JOUR RAPIDE (Extraction de données minimales)
        async function update() {
            document.getElementById('count').innerText = "SYNCHRONISATION...";
            const url = `${API.host}/player_api.php?username=${API.user}&password=${API.pass}&action=get_live_streams`;
            try {
                const r = await fetch(PROXY + encodeURIComponent(url));
                const data = await r.json();
                // On ne garde QUE ce qui est vital pour la vitesse
                db = data.map(ch => ({i: ch.stream_id, n: ch.name}));
                localStorage.setItem('db', JSON.stringify(db));
                filtered = db;
                document.getElementById('count').innerText = db.length + " CHAINES";
                render();
            } catch (e) { alert("Erreur réseau"); }
        }

        // 3. VIRTUAL RENDERING (Affiche seulement 20 lignes au lieu de 85 000)
        function render() {
            const scrollTop = listEl.scrollTop;
            const itemHeight = 50;
            const startIdx = Math.floor(scrollTop / itemHeight);
            const endIdx = startIdx + 20;
            
            const visibleItems = filtered.slice(startIdx, endIdx);
            
            listEl.innerHTML = `<div style="height:${startIdx * itemHeight}px"></div>` + 
                visibleItems.map(ch => `
                    <div class="ch-row" onclick="play('${ch.i}', '${ch.n.replace(/'/g," ")}')">
                        <span class="truncate">${ch.n}</span>
                    </div>
                `).join('') + 
                `<div style="height:${(filtered.length - endIdx) * itemHeight}px"></div>`;
        }

        function play(id, name) {
            document.getElementById('cur').innerText = name;
            document.getElementById('cur').style.opacity = "1";
            const stream = `${PROXY}${encodeURIComponent(API.host + '/live/' + API.user + '/' + API.pass + '/' + id + '.m3u8')}`;
            hls.loadSource(stream);
            hls.attachMedia(document.getElementById('v'));
        }

        function search() {
            const q = document.getElementById('search').value.toLowerCase();
            filtered = q.length < 2 ? db : db.filter(ch => ch.n.toLowerCase().includes(q));
            listEl.scrollTop = 0;
            render();
        }

        start();
    </script>
</body>
</html>
