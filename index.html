<!DOCTYPE html>

<script>

// ⚠️ IMPORTANT : ne jamais exposer des identifiants sensibles en production publique
const M3U_URL = "http://pl-ott.com/get.php?username=8576200005&password=9637719534&output=ts&type=m3u_plus"

const video = document.getElementById('video')
const list = document.getElementById('list')

let channels = []
let hlsInstance = null

async function loadPlaylist() {
  try {
    const res = await fetch(M3U_URL)
    const text = await res.text()

    channels = parseM3U(text)
    renderList()
    playChannel(channels[0])

  } catch (e) {
    list.innerHTML = "Erreur chargement playlist"
    console.error(e)
  }
}

function parseM3U(data) {
  const lines = data.split('
')
  const result = []

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith('#EXTINF')) {
      const name = lines[i].split(',')[1] || 'Unknown'
      const url = lines[i + 1]
      if (url && url.startsWith('http')) {
        result.push({ name, url })
      }
    }
  }

  return result
}

function renderList() {
  list.innerHTML = ''

  channels.forEach((ch, i) => {
    const div = document.createElement('div')
    div.className = 'channel'
    div.innerHTML = `<div class="channel-name">${ch.name}</div>`
    div.onclick = () => playChannel(ch)
    list.appendChild(div)
  })
}

function playChannel(channel) {

  if (hlsInstance) {
    hlsInstance.destroy()
    hlsInstance = null
  }

  if (Hls.isSupported()) {

    hlsInstance = new Hls({ lowLatencyMode: true })

    hlsInstance.loadSource(channel.url)
    hlsInstance.attachMedia(video)

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = channel.url
  }
}

loadPlaylist()

</script>

</body>
</html>
