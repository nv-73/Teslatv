<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLEYR PACKET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .page-btn { background: #111; border: 1px solid #222; padding: 10px 15px; border-radius: 8px; transition: 0.2s; }
        .page-btn:active { background: #e82127; border-color: #e82127; }
        .active-page { background: #e82127; border-color: #e82127; font-weight: bold; }
        .ch-item { background: #080808; border: 1px solid #1a1a1a; margin-bottom: 6px; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-14 flex items-center justify-between px-6 border-b border-white/5">
        <div class="font-bold tracking-tighter">PLEYR<span class="text-red-600">PACKET</span></div>
        <div id="info" class="text-[10px] opacity-50 uppercase tracking-widest">Calcul des paquets...</div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Colonne Gauche -->
        <aside class="w-[350px] flex flex-col bg-black border-r border-white/5">
            <div id="list" class="flex-1 overflow-y-auto p-3">
                <!-- Les 20 chaînes par paquet s'affichent ici -->
            </div>
            
            <!-- PAGINATION (Les petits paquets) -->
            <div id="pagination" class="h-16 border-t border-white/5 flex items-center justify-center gap-2 bg-[#050505]">
                <!-- Boutons de pages -->
            </div>
        </aside>

        <!-- Player -->
        <main class="flex-1 flex flex-col">
            <video id="videoPlayer" class="w-full aspect-video bg-black" controls autoplay></video>
            <div class="p-6">
                <h2 id="currentName" class="text-2xl font-bold italic uppercase opacity-20">Prêt</h2>
            </div>
        </main>
    </div>

    <script>
        const CONFIG = {
            host: "http://pl-ott.com:80",
            user: "8576200005",
            pass: "9637719534",
            proxy: "https://corsproxy.io/?",
            perPage: 20 // Taille du paquet
        };

        let allData = [];
        let currentPage = 0;
        const hls = new Hls();

        async function init() {
            const api = `${CONFIG.host}/player_api.php?username=${CONFIG.user}&password=${CONFIG.pass}&action=get_live_streams`;
            try {
                const r = await fetch(CONFIG.proxy + encodeURIComponent(api));
                allData = await r.json();
                document.getElementById('info').innerText = allData.length + " CHAINES";
                renderPage(0);
                renderPagination();
            } catch (e) { console.error(e); }
        }

        function renderPage(pageIdx) {
            currentPage = pageIdx;
            const start = pageIdx * CONFIG.perPage;
            const end = start + CONFIG.perPage;
            const chunk = allData.slice(start, end);

            const list = document.getElementById('list');
            list.innerHTML = chunk.map(ch => `
                <div class="ch-item p-4 flex items-center gap-3 cursor-pointer" onclick="play('${ch.stream_id}', '${ch.name.replace(/'/g, " ")}')">
                    <div class="w-8 h-8 bg-white/5 rounded flex items-center justify-center text-[10px] font-bold text-red-600">
                        ${ch.stream_id.slice(-2)}
                    </div>
                    <div class="truncate text-sm font-bold uppercase">${ch.name}</div>
                </div>
            `).join('');
            
            // Update active state of pagination buttons
            document.querySelectorAll('.page-btn').forEach((btn, idx) => {
                btn.classList.toggle('active-page', idx === pageIdx);
            });
            list.scrollTop = 0;
        }

        function renderPagination() {
            const nav = document.getElementById('pagination');
            const totalPages = Math.min(Math.ceil(allData.length / CONFIG.perPage), 8); // On limite à 8 boutons pour la Tesla
            
            let html = '';
            for(let i = 0; i < totalPages; i++) {
                html += `<button class="page-btn text-xs font-bold" onclick="renderPage(${i})">${i + 1}</button>`;
            }
            nav.innerHTML = html;
        }

        function play(id, name) {
            document.getElementById('currentName').innerText = name;
            document.getElementById('currentName').style.opacity = 1;
            const stream = `${CONFIG.proxy}${encodeURIComponent(CONFIG.host + '/live/' + CONFIG.user + '/' + CONFIG.pass + '/' + id + '.m3u8')}`;
            hls.loadSource(stream);
            hls.attachMedia(document.getElementById('videoPlayer'));
        }

        init();
    </script>
</body>
</html>
