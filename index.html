<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTV Premium - Xtream Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #ef4444; --bg: #0a0a0a; --sidebar: #121212; --card: #1e1e1e; }
        body { background-color: var(--bg); color: white; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .sidebar { background-color: var(--sidebar); height: calc(100vh - 64px); }
        .video-aspect { aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(5px); }
        .channel-item { transition: 0.2s; border-radius: 8px; margin: 2px 8px; }
        .channel-item:hover { background: #262626; transform: translateX(5px); }
        .active-ch { background: #262626; border-left: 4px solid var(--primary); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- MODALE DE CONNEXION XTREAM -->
    <div id="loginModal" class="modal flex items-center justify-center">
        <div class="bg-[#1a1a1a] p-8 rounded-3xl w-full max-w-md border border-gray-800">
            <div class="text-center mb-8">
                <div class="inline-block p-4 bg-red-600/10 rounded-full mb-4">
                    <i class="fa-solid fa-server text-3xl text-red-600"></i>
                </div>
                <h2 class="text-2xl font-bold">Connexion Xtream</h2>
                <p class="text-gray-500 text-sm mt-2">Accédez à vos bouquets TV en direct</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="host" placeholder="http://nom-du-serveur.com:8080" class="w-full bg-[#262626] border border-gray-700 p-3 rounded-xl focus:ring-2 focus:ring-red-600 outline-none">
                <input type="text" id="user" placeholder="Nom d'utilisateur" class="w-full bg-[#262626] border border-gray-700 p-3 rounded-xl focus:ring-2 focus:ring-red-600 outline-none">
                <input type="password" id="pass" placeholder="Mot de passe" class="w-full bg-[#262626] border border-gray-700 p-3 rounded-xl focus:ring-2 focus:ring-red-600 outline-none">
                <button onclick="connect()" id="loginBtn" class="w-full bg-red-600 hover:bg-red-700 py-3 rounded-xl font-bold transition flex justify-center items-center gap-2">
                    <span>Se connecter</span>
                    <div id="btnLoader" class="loader"></div>
                </button>
                <p class="text-[10px] text-gray-600 text-center uppercase tracking-widest mt-4">Sécurisé par WebTV Protocol</p>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="h-16 border-b border-gray-800 flex items-center justify-between px-6 bg-[#0f0f0f]">
        <div class="flex items-center gap-4">
            <span class="text-2xl font-black text-red-600 tracking-tighter">PLEYR<span class="text-white">CLONE</span></span>
        </div>
        <div class="hidden md:flex flex-1 max-w-md mx-10">
            <div class="relative w-full">
                <input type="text" id="search" onkeyup="filterChannels()" placeholder="Rechercher une chaîne..." class="w-full bg-[#1a1a1a] rounded-full py-2 px-10 text-sm border border-gray-800 focus:border-red-600 outline-none">
                <i class="fa-solid fa-search absolute left-4 top-3 text-gray-600 text-xs"></i>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <a href="https://youtube.com" target="_blank" class="bg-red-600 p-2 px-4 rounded-lg text-xs font-bold flex items-center gap-2">
                <i class="fa-brands fa-youtube"></i> YOUTUBE
            </a>
            <button onclick="document.getElementById('loginModal').style.display='flex'" class="bg-white text-black p-2 px-4 rounded-lg text-xs font-bold hover:bg-gray-200">
                <i class="fa-solid fa-plug mr-1"></i> SERVEUR
            </button>
        </div>
    </nav>

    <div class="flex">
        <!-- SIDEBAR -->
        <aside class="sidebar w-80 flex flex-col">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#161616]">
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Chaînes Live</span>
                <span id="chCount" class="text-[10px] bg-red-600/20 text-red-500 px-2 py-1 rounded">0</span>
            </div>
            <div id="channelList" class="flex-1 overflow-y-auto py-2">
                <div class="p-10 text-center text-gray-600">
                    <i class="fa-solid fa-tv mb-4 text-4xl block opacity-20"></i>
                    <p class="text-sm italic">Aucune chaîne chargée</p>
                </div>
            </div>
        </aside>

        <!-- PLAYER AREA -->
        <main class="flex-1 p-6 h-[calc(100vh-64px)] overflow-y-auto">
            <div class="max-w-5xl mx-auto">
                <div class="video-aspect mb-6">
                    <video id="mainPlayer" controls class="w-full h-full"></video>
                </div>

                <div class="flex items-start justify-between">
                    <div class="flex items-center gap-5">
                        <div id="chLogo" class="w-20 h-20 bg-[#1a1a1a] border border-gray-800 rounded-2xl flex items-center justify-center p-2">
                            <i class="fa-solid fa-satellite-dish text-3xl text-gray-700"></i>
                        </div>
                        <div>
                            <h1 id="chTitle" class="text-3xl font-bold">Prêt à diffuser</h1>
                            <p id="chCat" class="text-gray-500 flex items-center gap-2">
                                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                Système opérationnel • API Xtream
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="w-12 h-12 rounded-xl bg-[#1a1a1a] flex items-center justify-center border border-gray-800 hover:text-red-500"><i class="fa-solid fa-heart"></i></button>
                        <button class="w-12 h-12 rounded-xl bg-[#1a1a1a] flex items-center justify-center border border-gray-800 hover:text-blue-500"><i class="fa-solid fa-share-nodes"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let hls = new Hls();
        let allChannels = [];
        const video = document.getElementById('mainPlayer');

        async function connect() {
            const host = document.getElementById('host').value;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('loginBtn');
            const loader = document.getElementById('btnLoader');

            if(!host || !user || !pass) return alert("Veuillez remplir tous les champs.");

            btn.disabled = true;
            loader.style.display = "block";

            // Construction de l'URL API Xtream
            const url = `${host}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`;

            try {
                // Utilisation d'un proxy pour éviter les erreurs CORS sur GitHub
                const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
                const response = await fetch(proxy);
                const result = await response.json();
                const data = JSON.parse(result.contents);

                if(data.error) throw new Error();

                allChannels = data;
                renderChannels(allChannels, host, user, pass);
                document.getElementById('loginModal').style.display = 'none';
            } catch (e) {
                alert("Erreur de connexion. Vérifiez l'URL du serveur ou vos accès.");
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }

        function renderChannels(channels, host, user, pass) {
            const list = document.getElementById('channelList');
            document.getElementById('chCount').innerText = channels.length;
            list.innerHTML = "";

            channels.slice(0, 500).forEach(ch => {
                const streamUrl = `${host}/live/${user}/${pass}/${ch.stream_id}.m3u8`;
                const div = document.createElement('div');
                div.className = "channel-item p-3 cursor-pointer flex items-center gap-3";
                div.innerHTML = `
                    <div class="w-10 h-10 bg-black rounded overflow-hidden flex-shrink-0 flex items-center justify-center border border-gray-800">
                        ${ch.stream_icon ? `<img src="${ch.stream_icon}" class="w-full h-full object-contain">` : `<i class="fa-solid fa-tv text-[10px] text-gray-700"></i>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-bold truncate">${ch.name}</div>
                        <div class="text-[10px] text-gray-500 uppercase">${ch.category_id || 'Live'}</div>
                    </div>
                `;
                div.onclick = () => {
                    play(streamUrl, ch.name, ch.stream_icon);
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active-ch'));
                    div.classList.add('active-ch');
                };
                list.appendChild(div);
            });
        }

        function filterChannels() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
            // On récupère les identifiants pour relancer le render
            const host = document.getElementById('host').value;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            renderChannels(filtered, host, user, pass);
        }

        function play(url, name, icon) {
            document.getElementById('chTitle').innerText = name;
            if(icon) {
                document.getElementById('chLogo').innerHTML = `<img src="${icon}" class="w-full h-full object-contain">`;
            }

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }
    </script>
</body>
</html>
