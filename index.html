<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PLEYR TESLA EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        .ch-item { border-bottom: 1px solid #222; transition: 0.2s; }
        .ch-item:active { background: #333; } /* Meilleur pour écran tactile Tesla */
        .active { border-left: 4px solid #e11d48; background: #111; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header Tesla Style -->
    <div class="h-14 border-b border-gray-800 flex items-center justify-between px-6 bg-black">
        <span class="font-black italic text-red-600">PLEYR <span class="text-white">TESLA</span></span>
        <div id="status" class="text-[10px] text-gray-500 uppercase tracking-widest">Connecté au flux</div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Liste à gauche (plus large pour le tactile) -->
        <div class="w-1/3 border-r border-gray-800 flex flex-col bg-[#050505]">
            <div class="p-4">
                <input type="text" id="search" onkeyup="filter()" placeholder="Rechercher..." class="w-full bg-[#111] rounded-lg p-3 text-sm border border-gray-700 outline-none">
            </div>
            <div id="list" class="flex-1 overflow-y-auto">
                <div class="p-10 text-center text-gray-600 text-sm italic">Chargement des chaînes...</div>
            </div>
        </div>

        <!-- Lecteur à droite -->
        <div class="flex-1 flex flex-col bg-black">
            <div class="video-container">
                <video id="video" controls class="w-full h-full"></video>
            </div>
            <div class="p-6">
                <h1 id="title" class="text-2xl font-bold">Sélectionnez une chaîne</h1>
                <p id="cat" class="text-gray-500 text-sm mt-1">En attente de diffusion...</p>
            </div>
        </div>
    </div>

    <script>
        const host = "http://pl-ott.com:80";
        const user = "8576200005";
        const pass = "9637719534";
        const video = document.getElementById('video');
        let hls = new Hls();
        let allData = [];

        // Proxy spécial Tesla (via Workers)
        const teslaProxy = "https://corsproxy.io/?";

        async function init() {
            const api = `${host}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`;
            
            try {
                const resp = await fetch(teslaProxy + encodeURIComponent(api));
                const data = await resp.json();
                allData = data;
                render(allData);
            } catch (e) {
                document.getElementById('list').innerHTML = `<div class="p-4 text-red-500">Erreur : Le navigateur Tesla bloque la connexion.</div>`;
            }
        }

        function render(channels) {
            const container = document.getElementById('list');
            container.innerHTML = "";
            channels.slice(0, 200).forEach(ch => {
                const div = document.createElement('div');
                div.className = "ch-item p-4 flex items-center gap-4 cursor-pointer";
                div.innerHTML = `
                    <div class="w-10 h-10 bg-gray-900 rounded flex-shrink-0">
                        <img src="${ch.stream_icon}" class="w-full h-full object-contain" onerror="this.style.display='none'">
                    </div>
                    <div class="truncate text-sm font-medium">${ch.name}</div>
                `;
                div.onclick = () => {
                    play(`${host}/live/${user}/${pass}/${ch.stream_id}.m3u8`, ch.name, ch.category_name);
                    document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                };
                container.appendChild(div);
            });
        }

        function play(url, name, category) {
            document.getElementById('title').innerText = name;
            document.getElementById('cat').innerText = category || "Live";
            
            // On fait passer le flux m3u8 par le proxy pour la Tesla
            const secureUrl = teslaProxy + encodeURIComponent(url);

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(secureUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
        }

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            const f = allData.filter(c => c.name.toLowerCase().includes(q));
            render(f);
        }

        init();
    </script>
</body>
</html>
